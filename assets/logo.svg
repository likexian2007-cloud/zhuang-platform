<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="装配智建 logo">
  <defs>
    <linearGradient id="lg_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2747"/><stop offset="1" stop-color="#05101f"/>
    </linearGradient>
    <linearGradient id="lg_edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7df9ff"/><stop offset="1" stop-color="#1d7bff"/>
    </linearGradient>
    <linearGradient id="lg_top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(125,249,255,.95)"/><stop offset="1" stop-color="rgba(45,140,255,.7)"/>
    </linearGradient>
    <linearGradient id="lg_wallL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(0,200,255,.45)"/><stop offset="1" stop-color="rgba(0,90,200,.18)"/>
    </linearGradient>
    <linearGradient id="lg_wallR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(0,150,255,.30)"/><stop offset="1" stop-color="rgba(0,60,160,.12)"/>
    </linearGradient>
    <filter id="lg_glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角徽章底 -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#lg_bg)" stroke="url(#lg_edge)" stroke-width="1.6"/>

  <g filter="url(#lg_glow)">
    <!-- 正在吊装的预制顶板 + 吊钩 -->
    <line x1="32" y1="5" x2="32" y2="13" stroke="#7df9ff" stroke-width="1" stroke-dasharray="2 2"/>
    <circle cx="32" cy="5.5" r="1.6" fill="none" stroke="#7df9ff" stroke-width="1"/>
    <polygon points="32,9 24,13 32,17 40,13" fill="url(#lg_top)" opacity=".9"/>

    <!-- 顶面 -->
    <polygon points="32,20 15,28.5 32,37 49,28.5" fill="url(#lg_top)" stroke="#bdf3ff" stroke-width="1"/>
    <line x1="32" y1="20" x2="32" y2="37" stroke="rgba(5,16,31,.45)" stroke-width="1"/>

    <!-- 左墙（叠合预制板缝） -->
    <polygon points="15,28.5 32,37 32,53 15,44.5" fill="url(#lg_wallL)" stroke="url(#lg_edge)" stroke-width="1.4"/>
    <line x1="15" y1="34.8" x2="32" y2="43.3" stroke="rgba(125,249,255,.55)" stroke-width="0.9"/>
    <line x1="15" y1="40" x2="32" y2="48.5" stroke="rgba(125,249,255,.4)" stroke-width="0.9"/>

    <!-- 右墙 -->
    <polygon points="49,28.5 32,37 32,53 49,44.5" fill="url(#lg_wallR)" stroke="url(#lg_edge)" stroke-width="1.4"/>
    <line x1="49" y1="34.8" x2="32" y2="43.3" stroke="rgba(125,249,255,.4)" stroke-width="0.9"/>
    <line x1="49" y1="40" x2="32" y2="48.5" stroke="rgba(125,249,255,.3)" stroke-width="0.9"/>

    <!-- 底部灌浆套筒预留点 -->
    <g fill="#7df9ff">
      <circle cx="20.5" cy="44" r="1.1"/><circle cx="26" cy="46.7" r="1.1"/>
      <circle cx="38" cy="46.7" r="1.1"/><circle cx="43.5" cy="44" r="1.1"/>
    </g>
  </g>
</svg>
